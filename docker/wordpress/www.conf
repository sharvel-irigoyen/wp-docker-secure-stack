; ============================================================================
; PHP-FPM Pool Configuration - WordPress Production
; ============================================================================
; Overrides default www pool settings for performance and healthchecks
; ============================================================================

[www]
; ── Healthcheck Endpoints ──────────────────────────────────────────────────
ping.path = /ping
ping.response = pong
pm.status_path = /status

; ── Process Management ─────────────────────────────────────────────────────
; dynamic: scales workers based on demand (ideal for VPS with limited RAM)
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500
pm.process_idle_timeout = 10s

; ── Timeouts ───────────────────────────────────────────────────────────────
request_terminate_timeout = 300s

; ── Logging ────────────────────────────────────────────────────────────────
catch_workers_output = yes
decorate_workers_output = no

; ── Environment Variables ──────────────────────────────────────────────────
; Required: WordPress Docker image passes DB credentials via env vars
clear_env = no
