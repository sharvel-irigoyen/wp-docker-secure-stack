# ============================================================================
# Redis 7 Configuration - WordPress Object Cache
# ============================================================================
# Password is passed via CLI argument in docker-compose.yml (from .env)
# ============================================================================

# ── Memory ─────────────────────────────────────────────────────────────────
maxmemory 128mb
maxmemory-policy allkeys-lru

# ── Persistence (RDB Snapshots) ───────────────────────────────────────────
save 900 1
save 300 10
save 60 10000
dir /data
dbfilename dump.rdb
rdbcompression yes

# ── Logging ────────────────────────────────────────────────────────────────
loglevel notice

# ── Security: Disable Dangerous Commands ──────────────────────────────────
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""
rename-command DEBUG ""

# ── Network ────────────────────────────────────────────────────────────────
tcp-backlog 511
timeout 300
tcp-keepalive 60

# ── Performance ────────────────────────────────────────────────────────────
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
