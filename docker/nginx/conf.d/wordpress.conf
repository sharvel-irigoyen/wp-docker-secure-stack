# ============================================================================
# Nginx WordPress Virtual Host
# ============================================================================
# Listens on port 80 only — NPM handles SSL termination and domain routing
# ============================================================================

upstream php-fpm {
    server wordpress:9000;
}

server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php index.html;

    # ── Docker Healthcheck Endpoint ────────────────────────────────────────
    location = /nginx-health {
        access_log off;
        return 200 'healthy';
        add_header Content-Type text/plain;
    }

    # ── Security Headers ──────────────────────────────────────────────────
    include /etc/nginx/conf.d/security-headers.conf;

    # ── Block Sensitive Files ─────────────────────────────────────────────
    # .htaccess, .htpasswd, .git, etc.
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # wp-config.php
    location ~* /wp-config\.php {
        deny all;
    }

    # XML-RPC (common attack vector)
    location = /xmlrpc.php {
        deny all;
        return 403;
    }

    # Readme and license files (information disclosure)
    location ~* /(readme|license|changelog)\.(html|txt|md)$ {
        deny all;
    }

    # Block PHP execution in uploads directory
    location ~* /wp-content/uploads/.*\.php$ {
        deny all;
    }

    # Block access to wp-includes PHP files
    location ~* /wp-includes/.*\.php$ {
        deny all;
    }

    # ── Rate Limiting: wp-login.php ───────────────────────────────────────
    location = /wp-login.php {
        limit_req zone=wp_login burst=3 nodelay;
        limit_req_status 429;

        include fastcgi_params;
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_intercept_errors on;

        # Forward real IP from NPM
        fastcgi_param REMOTE_ADDR $http_x_forwarded_for;
    }

    # ── Rate Limiting: wp-admin ───────────────────────────────────────────
    location /wp-admin/ {
        limit_req zone=wp_general burst=20 nodelay;
        client_max_body_size 512M;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass php-fpm;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_intercept_errors on;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
            fastcgi_read_timeout 600;
            fastcgi_send_timeout 600;
        }
    }

    # ── PHP Processing ────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_intercept_errors on;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 300;

        # Forward real client IP from NPM
        fastcgi_param REMOTE_ADDR $http_x_forwarded_for;
    }

    # ── Static Assets Cache ───────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot|otf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;
    }

    # ── WordPress Permalinks ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$args;
    }
}
